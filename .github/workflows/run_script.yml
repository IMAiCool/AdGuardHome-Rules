name: Run AdGuard Rule Processor

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        run: |
          python adguard_rule_processor.py

      - name: Upload output files
        uses: actions/upload-artifact@v3
        with:
          name: output
          path: |
            all_rules.txt
            blacklist.txt
            whitelist.txt
            blacklist_css.txt
            whitelist_css.txt
